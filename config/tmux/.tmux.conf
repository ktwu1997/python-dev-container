# tmux 設定 —— 隨映像檔烘進 /root/.tmux.conf，並由 ssh-setup.sh 複製給 SSH 使用者。
# 修改後重新 build（docker compose up -d --build）即可套用到 root 與 SSH user。

# ── 基本體驗 ──────────────────────────────────────────────
# 啟用滑鼠：可用滑鼠選 pane、調整 pane 大小、捲動 scrollback、切換 window。
set -g mouse on
# scrollback 拉大（預設才 2000，翻 log 常不夠）。
set -g history-limit 50000
# 降低 ESC 延遲，vim/nvim 反應才跟手。
set -sg escape-time 10
# 讓 vim autoread / 焦點事件正常運作。
set -g focus-events on
# 終端類型 + 24-bit 真彩（bat/nvim 顏色才正確；mosh 1.4 支援）。
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
# 複製整合系統剪貼簿（OSC52，透過 ssh/mosh 也能用）。
set -g set-clipboard on

# ── 視窗 / pane 編號與操作 ────────────────────────────────
# window / pane 從 1 開始編號（配合鍵盤數字列）。
set -g base-index 1
setw -g pane-base-index 1
# 關掉某個 window 後自動重編號，不留空號。
set -g renumber-windows on
# copy mode 使用 vi 鍵位。
setw -g mode-keys vi
# 狀態列放上面。
set -g status-position top

# ── 好用的快捷鍵 ─────────────────────────────────────────
# prefix + r 快速重載本設定檔。
bind r source-file ~/.tmux.conf \; display "tmux reloaded"
# | 水平切、- 垂直切，且保留當前工作目錄。
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
