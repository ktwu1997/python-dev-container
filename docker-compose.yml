name: ${OWNER_NAME:-default}-python-dev-container

services:
  python-dev:
    build: .
    image: ${OWNER_NAME:-default}-python-dev:latest
    container_name: ${OWNER_NAME:-default}-python-dev-container
    ports:
      - "${SSH_PORT:-2222}:22"  # SSH port mapping from .env
    volumes:
      - ${HOST_WORK_DIR}:/workspace
      - ~/.ssh/id_ed25519.pub:/tmp/host_ssh_key.pub:ro
      # Persist Claude Code config (~/.claude), MemPalace memory (~/.mempalace)
      # and Codex config (~/.codex — auth.json, config.toml, AGENTS.md) across
      # container rebuilds/recreates. Host paths come from .env (see
      # .env.example); ssh-setup.sh seeds them from the build-time install only
      # when they are empty, so existing memory is never clobbered.
      - ${HOST_CLAUDE_DIR:-./.persist/claude}:/home/${SSH_USER}/.claude
      - ${HOST_MEMPALACE_DIR:-./.persist/mempalace}:/home/${SSH_USER}/.mempalace
      - ${HOST_CODEX_DIR:-./.persist/codex}:/home/${SSH_USER}/.codex
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - SSH_USER=${SSH_USER}
      - SSH_PASSWORD=${SSH_PASSWORD}
      # GPU 相關：僅在有 NVIDIA GPU 的 Linux 主機啟用；Mac/OrbStack 無 GPU，保持註解
      # - NVIDIA_VISIBLE_DEVICES=all
      # - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Timezone for shell + p10k time segment (override in .env if needed)
      - TZ=${TZ:-Asia/Taipei}
    # GPU 預留：Mac 無 NVIDIA GPU 會導致容器無法啟動，故註解。
    # 在 GPU Linux 主機上可取消下列註解以啟用 GPU。
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      app-net: null

networks:
  app-net:
    name: ${OWNER_NAME:-default}-app-net
    driver: bridge